<!DOCTYPE html>
<html>

<head>
    <title>Cari Rekomendasi Resep</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <script>
        if ( "serviceWorker" in navigator )
        {
            navigator.serviceWorker.register( "/static/service-worker.js" )
                .then( reg => console.log( "Service Worker registered:", reg ) )
                .catch( err => console.log( "Service Worker failed:", err ) );
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e3f2fd);
        }

        .search-card {
            max-width: 600px;
            margin: auto;
        }

        .btn:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>

<body class="container mt-5">

    <!-- Hero Section -->
    <div class="text-center mb-5">
        <h1 class="text-primary">🍲 Cari Rekomendasi Resep</h1>
        <p class="text-muted">Temukan resep mirip berdasarkan bahan dan kategori</p>
    </div>

    <!-- Search Card -->
    <div class="card shadow-lg search-card">
        <div class="card-body">
            <form method="POST" class="d-flex gap-2">
                <input type="text" id="nama_resep" class="form-control" name="nama_resep"
                    placeholder="Masukkan nama resep..." required>
                <button type="submit" class="btn btn-success btn-lg rounded-pill" aria-label="Cari resep">
                    🔍 Cari
                </button>

            </form>

            {% if error %}
            <div class="alert alert-danger mt-3">{{ error }}</div>
            {% endif %}
        </div>
    </div>

    <!-- jQuery + jQuery UI -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
    <script>
        var resepList = {{ resep_list| tojson }};
        $( "#nama_resep" ).autocomplete( {
            source: resepList,
            minLength: 2
        } );
    </script>
</body>

</html>
