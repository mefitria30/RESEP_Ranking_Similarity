<!DOCTYPE html>
<html>

<head>
    <title>Cari Rekomendasi Resep</title>
    <link rel="stylesheet" href="/static/assets/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/jquery-ui.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <script>
        if ( "serviceWorker" in navigator )
        {
            navigator.serviceWorker.register( "/service-worker.js" )
                .then( reg => console.log( "Service Worker registered:", reg ) )
                .catch( err => console.log( "Service Worker failed:", err ) );
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e3f2fd);
        }

        .search-card {
            max-width: 600px;
            margin: auto;
        }

        .btn:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>

<body class="container mt-5">

    <!-- Hero Section -->
    <div class="text-center mb-5">
        <h1 class="text-primary">🍲 Cari Rekomendasi Resep</h1>
        <p class="text-muted">Temukan resep mirip berdasarkan bahan dan kategori</p>
    </div>

    <!-- Search Card -->
    <div class="card shadow-lg search-card">
        <div class="card-body">
            <form id="searchForm" class="d-flex gap-2">
                <input type="text" id="nama_resep" class="form-control" name="nama_resep"
                    placeholder="Masukkan nama resep..." required>
                <button type="submit" class="btn btn-success btn-lg rounded-pill" aria-label="Cari resep">
                    🔍 Cari
                </button>
            </form>

            <div id="hasilRekomendasi" class="mt-4"></div>
        </div>
    </div>

    <!-- jQuery + jQuery UI -->
    <script src="/static/assets/jquery-3.6.0.min.js"></script>
    <script src="/static/assets/jquery-ui.js"></script>

    <!-- Autocomplete list dari Flask -->
    <script>
        var resepList = {{ resep_list| tojson }};
        $( "#nama_resep" ).autocomplete( {
            source: resepList,
            minLength: 2
        } );
    </script>

    <!-- Load recommend.js -->
    <script src="/static/recommend.js"></script>
    <script>
        // Tangkap submit form

        document.getElementById( "searchForm" ).addEventListener( "submit", function ( e )
        {
            const namaResep = document.getElementById( "nama_resep" ).value;

            if ( !navigator.onLine )
            {
                // OFFLINE → pakai JS
                e.preventDefault();
                cariResep( namaResep )
                    .then( rekomendasi =>
                    {
                        const html = rekomendasi.map( r => `
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">${ r.nama_resep }</h5>
                        <p class="card-text">Kategori: ${ r.kategori }</p>
                        <p class="card-text">Waktu: ${ r.waktu_masak } menit</p>
                        <p class="card-text">Similarity: ${ ( r.similarity * 100 ).toFixed( 1 ) }%</p>
                    </div>
                </div>
                `).join( "" );
                        document.getElementById( "hasilRekomendasi" ).innerHTML = html;
                    } )
                    .catch( err =>
                    {
                        document.getElementById( "hasilRekomendasi" ).innerHTML =
                            `<div class="alert alert-danger">Resep tidak ditemukan: ${ err.message }</div>`;
                    } );
            } else
            {
                // ONLINE → biarkan form submit ke Flask
                // jangan preventDefault, biar server render result.html
            }
        } );

    </script>
</body>

</html>
